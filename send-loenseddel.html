<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send lønseddel - EK</title>
<style>
body{font-family:Arial; margin:0; background:#f4f6f8;}
header{background:#0b3d91; color:white; text-align:center; padding:40px;}
section{max-width:800px; margin:auto; padding:40px 20px;}
.box{background:white; padding:25px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1);}
input, textarea{width:100%; padding:8px; margin-top:8px; margin-bottom:10px; border-radius:6px; border:1px solid #ccc;}
button{background:#0b3d91; color:white; border:none; padding:10px 18px; border-radius:6px; cursor:pointer;}
a{display:inline-block; margin-top:20px; background:#0b3d91; color:white; padding:10px 18px; text-decoration:none; border-radius:6px;}
</style>
</head>
<body>
<header>
<h1>Send din lønseddel</h1>
</header>
<section>
<div class="box">
<p>Upload din lønseddel hvis du er i tvivl om din løn eller dine feriedage.</p>
<input type="file"><br><br>
<textarea placeholder="Skriv hvad du er i tvivl om"></textarea><br><br>
<button>Send</button><br><br>
<a href="index.html">Tilbage til forsiden</a>
</div>
</section>
</body>
</html>
